<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexel Chat</title>
    <link rel="stylesheet" href="style.css?v=14">
</head>
<body>
    <div class="auth-screen hidden" id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">Nexel</div>

            <div class="auth-tabs">
                <div class="slider"></div>
                <button class="auth-tab active" id="show-login-button">
                    Login
                </button>

                <button class="auth-tab" id="show-register-button">
                    Register
                </button>
            </div>

            <div class="auth-form" id="login-form">
                <input 
                    id="login-email-input"
                    class="auth-input"
                    type="email"
                    placeholder="Email"
                    autocomplete="username"
                >

                <input 
                    id="login-password-input"
                    class="auth-input"
                    type="password"
                    placeholder="Password"
                    autocomplete="current-password"
                >

                <button id="login-button" class="auth-button primary">
                    Login
                </button>
            </div>

            <div class="auth-form hidden" id="register-form">
                <input 
                    id="register-name-input"
                    class="auth-input"
                    type="text"
                    placeholder="Name"
                    autocomplete="name"
                >

                <input 
                    id="register-email-input"
                    class="auth-input"
                    type="email"
                    placeholder="Email"
                    autocomplete="email"
                >

                <input 
                    id="register-password-input"
                    class="auth-input"
                    type="password"
                    placeholder="Password"
                    autocomplete="new-password"
                >

                <button id="register-button" class="auth-button primary">
                    Register
                </button>
            </div>

            <p id="auth-status" class="auth-status"></p>
        </div>
    </div>

    <div class="app hidden" id="chat-app">
        <header class="app-header">
            <div class="logo">Nexel</div>

            <div class="header-actions">
                <button class="account-button" id="account-button" type="button">
                    <span class="account-avatar" id="account-avatar">U</span>
                    <span class="account-text">Account</span>
                </button>

                <button class="logout-button">
                    Logout
                </button>
            </div>
        </header>

        <main class="chat-layout">
            <aside class="sidebar">
                <button class="new-chat-button">
                    <span>+</span>
                </button>

                <div class="chat-list" id="chat-list">
                    <div class="chat-list-loading">Loading...</div>
                </div>
            </aside>

            <section class="chat-panel">
                <div class="chat-header hidden" id="chat-header">
                    <button class="mobile-back-button" id="mobile-back-button" type="button">
                        ←
                    </button>
                    <div class="chat-header-avatar" id="chat-header-avatar">
                        ?
                    </div>

                    <div class="chat-header-info">
                        <div class="chat-header-name" id="chat-header-name">
                            Select chat
                        </div>

                        <div class="chat-header-subtitle" id="chat-header-subtitle">
                            No chat selected
                        </div>
                        <div class="chat-header-status hidden" id="chat-header-status">
                            Offline
                        </div>
                    </div>
                </div>
                <div class="messages-list" id="messages-list">
                    <div class="message-list-empty">
                        Select a chat to start messaging
                    </div>
                </div>
                <div class="toast-container" id="toast-container"></div>

                <form class="message-form hidden" id="message-form" autocomplete="off">
                    <textarea
                        id="message-input"
                        class="message-input"
                        placeholder="Type message..."
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="sentences"
                        spellcheck="false"
                        enterkeyhint="send"
                        inputmode="text"
                        name="nexel_chat_message_field"
                        data-lpignore="true"
                        data-form-type="other"
                    ></textarea>

                    <button class="send-button" id="send-button" type="submit">
                        ➤
                    </button>
                </form>
            </section>
        </main>
    </div>

    <div class="modal-overlay hidden" id="new-chat-modal">
        <div class="modal-card">
            <h2 class="modal-title">Create new chat</h2>
            <p class="modal-subtitle">Search user by name</p>

            <input 
                id="new-chat-user-input"
                class="modal-input"
                type="text"
                placeholder="Search by name"
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
                name="nexel_user_search"
            >

            <p id="new-chat-status" class="modal-status"></p>

            <div class="user-search-results" id="user-search-results"></div>

            <div class="modal-actions">
                <button class="modal-button secondary" id="cancel-new-chat-button">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="account-modal">
        <div class="modal-card account-card">
            <h2 class="modal-title">Account</h2>
            <p class="modal-subtitle">Your Nexel account info</p>

            <div class="account-profile-block">
                <div class="account-profile-avatar" id="account-profile-avatar">
                    U
                </div>

                <div class="account-profile-info">
                    <div class="account-profile-name" id="account-profile-name">
                        User
                    </div>

                    <div class="account-profile-email" id="account-profile-email">
                        ID: <span id="account-user-id">-</span>
                    </div>
                </div>
            </div>

           <div class="profile-actions">
                <button class="modal-button secondary" id="copy-account-id-button" type="button">
                    Copy User ID
                </button>

                <button class="modal-button secondary" id="open-profile-button" type="button">
                    Open profile
                </button>
            </div>

            <div class="modal-actions">
                <button class="modal-button secondary" id="close-account-modal-button" type="button">
                    Close
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="partner-profile-modal">
        <div class="modal-card account-card">
            <h2 class="modal-title">Profile</h2>
            <p class="modal-subtitle">Chat partner info</p>

            <div class="account-profile-block">
                <div class="account-profile-avatar" id="partner-profile-avatar">
                    U
                </div>

                <div class="account-profile-info">
                    <div class="account-profile-name" id="partner-profile-name">
                        User
                    </div>

                    <div class="account-profile-email">
                        ID: <span id="partner-profile-id">—</span>
                    </div>
                </div>
            </div>

            <div class="profile-actions">
                <button class="modal-button secondary" id="copy-partner-id-button" type="button">
                    Copy User ID
                </button>

                <button class="modal-button secondary" id="open-partner-profile-button" type="button">
                    Open profile
                </button>
            </div>

            <div class="modal-actions">
                <button class="modal-button secondary" id="close-partner-profile-button" type="button">
                    Close
                </button>
            </div>
        </div>
    </div>

<script src="js/config.js?v=17"></script>
<script src="js/state.js?v=17"></script>
<script src="js/dom.js?v=17"></script>
<script src="js/api.js?v=17"></script>
<script src="js/auth.js?v=17"></script>
<script src="js/ui.js?v=17"></script>
<script src="js/mobile.js?v=17"></script>
<script src="js/chats.js?v=17"></script>
<script src="js/messages.js?v=17"></script>
<script src="js/socket.js?v=17"></script>
<script src="js/users.js?v=17"></script>
<script src="js/main.js?v=17"></script>
</body>
</html>
